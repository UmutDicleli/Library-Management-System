<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kitap Sil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">🗑 Kitap Kopyası Sil</h2>

        <div class="card shadow p-4">
            <label class="fw-bold">Silinecek Kitap Kopya ID</label>
            <input id="copyId" type="number" class="form-control mb-3">

            <button onclick="deleteCopy()" class="btn btn-danger w-100">
                Kitabı Sil
            </button>
        </div>

        <a href="index.html" class="btn btn-link mt-3">← Ana Sayfa</a>
    </div>

    <script>
async function deleteCopy() {
    const id = document.getElementById("copyId").value;

    if (!id) {
        alert("Lütfen kitap kopya ID giriniz.");
        return;
    }

    const response = await fetch("/api/Admin/deletecopy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ bookPublishId: parseInt(id) })
    });

    const text = await response.text();
    alert(text);
}
    </script>

</body>
</html>
