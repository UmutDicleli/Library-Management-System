<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Üye Sil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">🗑️ Üye Silme</h2>

        <div class="card shadow p-4">
            <label class="fw-bold">Üye Email</label>
            <input id="email" class="form-control mb-3" placeholder="uye@email.com">

            <button onclick="deleteMember()" class="btn btn-danger w-100">
                Üyeyi Sil
            </button>
        </div>

        <a href="index.html" class="btn btn-link mt-3">← Ana Sayfa</a>
    </div>

    <script>
async function deleteMember() {
    const email = document.getElementById("email").value.trim();

    if (!email) {
        alert("Email boş olamaz!");
        return;
    }

    const response = await fetch(`/api/Member/delete?email=${email}`, {
        method: "DELETE"
    });

    const text = await response.text();
    alert(text);
}
    </script>

</body>
</html>
