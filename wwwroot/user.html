
<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Kullanıcı – Kitap Kiralama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">📘 Kitap Kiralama</h2>

        <div class="card shadow p-4">

            <label class="fw-bold">Email</label>
            <input id="email" class="form-control mb-3" placeholder="ornek@mail.com">

            <label class="fw-bold">Kitap Adı</label>
            <input id="book" class="form-control mb-4" placeholder="Kiralamak istediğiniz kitap">

            <button class="btn btn-primary w-100" onclick="rentBook()">
                📚 Kitabı Kirala
            </button>

        </div>

        <a href="index.html" class="btn btn-link mt-3">← Ana Sayfa</a>
    </div>


    <script>
        async function rentBook() {

            const request = {
                memberEmail: document.getElementById("email").value,
                bookTitle: document.getElementById("book").value
            };

            const response = await fetch("/api/Rent/rentbook", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(request)
            });

            const text = await response.text();
            alert(text);
        }
    </script>

</body>

</html>
