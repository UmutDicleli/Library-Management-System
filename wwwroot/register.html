<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <title>Üye Kayıt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4"> Yeni Üye Kaydı</h2>

        <div class="card shadow p-4">

            <label>Ad</label>
            <input id="fname" class="form-control mb-3">

            <label>Soyad</label>
            <input id="lname" class="form-control mb-3">

            <label>Email</label>
            <input id="email" class="form-control mb-3" type="email">

            <label>Telefon Numarası</label>
            <input id="phone" class="form-control mb-4" placeholder="0555 555 55 55">

            <button class="btn btn-success w-100" onclick="register()">Kaydı Tamamla</button>
        </div>

        <a href="index.html" class="btn btn-link mt-3">← Ana Sayfaya Dön</a>
    </div>


    <script>
async function register() {

    const member = {
        memberFirstName: document.getElementById("fname").value,
        memberLastName: document.getElementById("lname").value,
        memberEmail: document.getElementById("email").value,
        memberPhoneNumber: document.getElementById("phone").value
    };

    const response = await fetch("/api/Member/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(member)
    });

    const text = await response.text();
    alert(text);
}
    </script>

</body>
</html>
