<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Yönetici – Yeni Kitap Ekle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">📗 Yeni Kitap Girişi</h2>

        <div class="card shadow p-4">

            <label class="fw-bold">Kitap Adı</label>
            <input id="bookName" class="form-control mb-3" placeholder="Kitabın adı">

            <label class="fw-bold">Yazar Adı</label>
            <input id="authorName" class="form-control mb-3" placeholder="Yazar adı">

            <label class="fw-bold">Yayın Evi</label>
            <input id="publisherName" class="form-control mb-4" placeholder="Yayın evi adı">

            <button onclick="addBook()" class="btn btn-warning w-100">
                ➕ Yeni Kitap Ekle
            </button>

        </div>

        <a href="index.html" class="btn btn-link mt-3">← Ana Sayfa</a>

    </div>

    <script>
        async function addBook() {

            const bookName = document.getElementById("bookName").value.trim();
            const authorName = document.getElementById("authorName").value.trim();
            const publisherName = document.getElementById("publisherName").value.trim();

            if (!bookName) {
                alert("Kitap adı boş olamaz!");
                return;
            }
            if (!authorName) {
                alert("Yazar adı boş olamaz!");
                return;
            }
            if (!publisherName) {
                alert("Yayın evi boş olamaz!");
                return;
            }

            const request = {
                bookTitle: bookName,
                authorName: authorName,
                publisherName: publisherName
            };

            const response = await fetch("/api/Admin/newcopy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(request)
            });

            const text = await response.text();
            alert(text);
        }
    </script>

</body>

</html>
